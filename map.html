    const layers = {
        pct_indigenous: {label: 'Percent Indigenous', min: 0, max: 90},
        First_Nations: {label: 'First Nations', min: 0, max: Math.max(...features.map(f => f.values.First_Nations))},
        Inuit: {label: 'Inuit', min: 0, max: Math.max(...features.map(f => f.values.Inuit))},
        Métis: {label: 'Métis', min: 0, max: Math.max(...features.map(f => f.values.Métis))}
    };
    const colors = ['#ffffcc','#ffeda0','#fed976','#feb24c','#fd8d3c','#fc4e2a','#e31a1c','#bd0026','#800026'];
    function colorFor(value, layer) {
        const meta = layers[layer];
        const pct = Math.max(0, Math.min(1, (value - meta.min) / (meta.max - meta.min || 1)));
        return colors[Math.min(colors.length - 1, Math.floor(pct * colors.length))];
    }
    function tooltipHTML(t) {
        return '<table>' + Object.entries(t).map(([k,v]) => `<tr><th>${k}:</th><td>${v}</td></tr>`).join('') + '</table>';
    }
    function renderFallback() {
        const mapDiv = document.querySelector('.folium-map');
        if (!mapDiv) return;
        mapDiv.innerHTML = `
            <div class="offline-map-wrap">
                <div class="offline-map-title">Indigenous Populations in Canada</div>
                <div class="offline-map-controls">
                    <b>Layers</b>
                    <label><input type="radio" name="offlineLayer" value="pct_indigenous" checked> Percent Indigenous</label>
                    <label><input type="radio" name="offlineLayer" value="First_Nations"> First Nations</label>
                    <label><input type="radio" name="offlineLayer" value="Inuit"> Inuit</label>
                    <label><input type="radio" name="offlineLayer" value="Métis"> Métis</label>
                </div>
                <div class="offline-map-tooltip"></div>
                <svg viewBox="0 0 1000 650" width="1000" height="650" aria-label="Canada choropleth map">
                    <g class="offline-features"></g>
                </svg>
            </div>`;
        const g = mapDiv.querySelector('.offline-features');
        const tip = mapDiv.querySelector('.offline-map-tooltip');
        let currentLayer = 'pct_indigenous';
        function draw() {
            g.innerHTML = '';
            features.forEach(f => {
                const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                p.setAttribute('d', f.path);
                p.setAttribute('fill', colorFor(f.values[currentLayer], currentLayer));
                p.setAttribute('stroke', 'black');
                p.setAttribute('stroke-width', '1');
                p.setAttribute('fill-opacity', '0.75');
                p.addEventListener('mouseover', () => {
                    p.setAttribute('stroke-width', '3');
                    p.setAttribute('fill-opacity', '0.95');
                    tip.innerHTML = tooltipHTML(f.tooltip);
                    tip.style.display = 'block';
                });
                p.addEventListener('mousemove', evt => {
                    const rect = mapDiv.getBoundingClientRect();
                    tip.style.left = (evt.clientX - rect.left + 14) + 'px';
                    tip.style.top = (evt.clientY - rect.top + 14) + 'px';
                });
                p.addEventListener('mouseout', () => {
                    p.setAttribute('stroke-width', '1');
                    p.setAttribute('fill-opacity', '0.75');
                    tip.style.display = 'none';
                });
                g.appendChild(p);
            });
        }
        mapDiv.querySelectorAll('input[name="offlineLayer"]').forEach(el => {
            el.addEventListener('change', e => { currentLayer = e.target.value; draw(); });
        });
        draw();
    }
    window.setTimeout(function() {
        const mapDiv = document.querySelector('.folium-map');
        const leafletLoaded = mapDiv && mapDiv.querySelector('.leaflet-pane');
        renderFallback();
    }, 800);
})();
